events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Nén Gzip để tăng tốc độ tải trang
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream fastapi_server {
        server 127.0.0.1:8000;
    }

    upstream streamlit_server {
        server 127.0.0.1:8501;
    }

    server {
        listen 8080;
        server_name _;

        # Cấu hình kích thước request tối đa (để upload/tải file CSV)
        client_max_body_size 20M;

        # Định tuyến các request API đến FastAPI
        location ~ ^/(sync|status|docs|openapi.json) {
            proxy_pass http://fastapi_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Thời gian timeout lớn cho các pipeline chạy lâu
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Cấu hình WebSockets cho Streamlit (Cực kỳ quan trọng để Streamlit hoạt động)
        location /_stcore/stream {
            proxy_pass http://streamlit_server/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # Định tuyến toàn bộ traffic khác tới Streamlit Dashboard
        location / {
            proxy_pass http://streamlit_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Hỗ trợ WebSockets nâng cấp
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }
}
