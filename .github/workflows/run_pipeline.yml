name: Auto Survey Analysis Pipeline

on:
  repository_dispatch:
    types: [survey_submitted]
  workflow_dispatch:

# Quyền hạn cho phép workflow ghi ngược lại thay đổi vào repository
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Cài đặt Python 3.10
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # Tự động cache pip package để tăng tốc build ở các lần sau

    # Cài đặt các thư viện phụ thuộc
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Tạo thư mục raw nếu chưa có
    - name: Create Raw Directory
      run: mkdir -p raw

    # Tải dữ liệu Google Sheet CSV mới nhất từ link public của bạn
    - name: Download Google Sheets Data
      run: |
        python -c "import urllib.request; urllib.request.urlretrieve('https://docs.google.com/spreadsheets/d/1P_hyU6PUNp7ePHZQKY_G0aMwJgPjmxLhmhawHWjb_dY/export?format=csv&gid=135898341', 'raw/CI_CD Survey Output - Student.csv')"

    # Thực thi pipeline phân tích (Chạy tuần tự các Jupyter Notebook)
    - name: Run Analysis Pipeline
      run: python run_pipeline.py

    # Tạo trang web tĩnh (HTML) cho GitHub Pages và copy biểu đồ sang docs/
    - name: Generate Static Web Page
      run: python src/generate_static_site.py

    # Tự động commit các file dữ liệu sạch, biểu đồ và trang web tĩnh trong docs/ đẩy lên GitHub
    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -f processed/ reports/ interim/ docs/
        git commit -m "chore: auto-update survey analysis and web dashboard [skip ci]" || echo "Không có thay đổi mới để commit"
        git push

